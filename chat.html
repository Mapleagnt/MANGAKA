<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site com Chat Discord</title>
<link rel="stylesheet" href="style.css"> <!-- seu CSS original -->
<style>
  /* Container centralizado do chat */
  #chat-wrapper {
    width: 100%;
    max-width: 600px;
    margin: 50px auto; /* centralizado vertical e horizontal */
  }

  #chat-container {
    border: 2px solid #555;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    background-color: #2c2f33;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    padding: 10px;
    height: 300px;
    overflow-y: auto;
    color: #f1f1f1;
    font-family: Arial, sans-serif;
  }

  .message { margin-bottom: 8px; }
  .message .author { font-weight: bold; }

  #input-container {
    display: flex;
    border-top: 1px solid #555;
  }

  #message-input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    background-color: #23272a;
    color: #f1f1f1;
  }

  #send-btn {
    padding: 10px 15px;
    border: none;
    background-color: #7289da;
    color: white;
    cursor: pointer;
  }

  #send-btn:hover {
    background-color: #5b6eae;
  }
</style>
</head>
<body>

<!-- Seu site original -->
<div id="site-original">
  <h1>Bem-vindo ao Site</h1>
  <p>Conteúdo do site aqui...</p>
</div>

<!-- Chat integrado -->
<div id="chat-wrapper">
  <div id="chat-container">
    <div id="messages"></div>
    <div id="input-container">
      <input type="text" id="message-input" placeholder="Digite sua mensagem...">
      <button id="send-btn">Enviar</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
