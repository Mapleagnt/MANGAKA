<!DOCTYPE html><html>
<body><script>
window.onload = function() {
    const hash = window.location.hash;

    if (!hash) {
        document.body.innerText = "Token não encontrado";
        return;
    }

    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    if (token) {
        localStorage.setItem("discord_token", token);

        // Debug (pra garantir)
        document.body.innerText = "Login realizado! Redirecionando...";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);

    } else {
        document.body.innerText = "Erro ao capturar token";
    }
};
</script></body>
</html>
